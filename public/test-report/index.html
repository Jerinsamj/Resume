<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Website Test Results</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
      background-color: #f4f4f4;
    }
    h1 {
      color: #333;
    }
    .timestamp {
      color: #666;
      margin-bottom: 20px;
    }
    .report-container {
      max-width: 1000px;
      margin: 20px auto;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      padding: 20px;
      box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
    }
    .test-summary {
      display: flex;
      justify-content: space-around;
      padding: 10px;
      margin-top: 10px;
    }
    .test-summary div {
      padding: 10px;
      border-radius: 5px;
      font-size: 18px;
      font-weight: bold;
      width: 22%;
    }
    .total { background: #d3d3d3; }
    .passed { background: #8bc34a; color: white; }
    .failed { background: #f44336; color: white; }
    .pending { background: #ffc107; color: black; }
    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
  </style>
</head>
<body>
  <h1>Cypress Test Results for Resume Website</h1>
  <p class="timestamp">Last updated: <span id="date"></span></p>

  <div class="report-container">
    <div class="test-summary">
      <div class="total">Total: <span id="total-tests">--</span></div>
      <div class="passed">Passed: <span id="passed-tests">--</span></div>
      <div class="failed">Failed: <span id="failed-tests">--</span></div>
      <div class="pending">Pending: <span id="pending-tests">--</span></div>
    </div>
    
  </div>

  <script>
    document.getElementById('date').textContent = new Date().toLocaleString();

    // Fetch JSON test results
    fetch('./mochawesome.json')
      .then(response => response.json())
      .then(data => {
        const totalTests = data.stats.tests;
        const passedTests = data.stats.passes;
        const failedTests = data.stats.failures;
        const pendingTests = data.stats.pending;

        document.getElementById('total-tests').textContent = totalTests;
        document.getElementById('passed-tests').textContent = passedTests;
        document.getElementById('failed-tests').textContent = failedTests;
        document.getElementById('pending-tests').textContent = pendingTests;
      })
      .catch(error => {
        console.error('Error loading test results:', error);
      });
  </script>
</body>
</html>
