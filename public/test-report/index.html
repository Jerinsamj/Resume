<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Website Test Results</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #333;
    }
    .timestamp {
      color: #666;
      margin-bottom: 20px;
    }
    .report-container {
      max-width: 1000px;
      margin: 0 auto;
      border: 1px solid #ddd;
      border-radius: 5px;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
  </style>
</head>
<body>
  <h1>Cypress Test Results for Resume Website</h1>
  <p class="timestamp">Last updated: <span id="date"></span></p>
  
  <div class="report-container">
    <iframe src="cypress/results/mochawesome.html" title="Test Report"></iframe>
  </div>

  <script>
    document.getElementById('date').textContent = new Date().toLocaleString();
  </script>
</body>
</html>
