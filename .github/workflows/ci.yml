name: Run Cypress Tests

on:
  push:
    branches:
      - main

jobs:
  cypress:
    runs-on: ubuntu-latest
    steps:
      # ✅ Step 1: Checkout Latest Code
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Step 2: Show Latest Commit
      - name: Show latest commit
        run: git log -1

      # ✅ Step 3: Set Up Node.js & Cache Dependencies
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'  # Enables caching of node_modules

      # ✅ Step 4: Install Dependencies (Use npm ci for clean install)
      - name: Install dependencies
        run: npm ci

      # ✅ Step 5: Install dependencies
      - name: Install dependencies
        run: npm install

      # ✅ Step 6: Upload Cypress Test Results
      - name: Upload Cypress test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: cypress/results

      # ✅ Step 7: Generate and Upload Mochawesome Report
      - name: Generate and Upload Mochawesome Report
        if: always()
        run: |
          REPORT_DIR="docs/cypress-results"
          mkdir -p $REPORT_DIR
          find cypress/results -name "*.html" -exec cp {} $REPORT_DIR \; || echo "No HTML reports found."
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add $REPORT_DIR || echo "No new results to commit."
          git commit -m "Update Cypress results" || echo "No changes to commit."
          git push || echo "No changes to push."

         # ✅ Step 8: Generate and Upload Mochawesome Report
      - name: Generate and Upload Mochawesome Report
        if: always()
        run: |
          REPORT_DIR="docs/cypress-results"
          mkdir -p $REPORT_DIR
          
          # Copy reports if available
          cp -r cypress/results/*.html $REPORT_DIR/ || echo "No HTML reports found."
          
          # Force Git to detect changes
          echo "Report generated on: $(date)" > $REPORT_DIR/timestamp.txt
          
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add $REPORT_DIR
          git commit -m "Update Cypress results" --allow-empty
          git push
  
