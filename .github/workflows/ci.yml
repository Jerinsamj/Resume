name: Run Cypress Tests

on:
  push:
    branches:
      - main

jobs:
  cypress:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3 # Use v3 for better performance and features

      # Step 2: Cache Node.js dependencies for faster builds
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      # Step 3: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3 # Use v3
        with:
          node-version: '16' # Or 18, or 'lts/*' for latest LTS

      # Step 4: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 5: Run Cypress tests
      - name: Run Cypress tests
        # Use Cypress GitHub Action for better integration and reporting
        uses: cypress-io/github-action@v5 # Use v5
        with:
          browser: chrome # Specify the browser (optional, defaults to chrome)
          # More Cypress options can be added here, like:
          # spec: "cypress/integration/**/*.spec.js" #  Run specific tests
          # record: true #  Record tests to Cypress Dashboard (if you have it set up)
          # parallel: true # Run tests in parallel (if you have Cypress Cloud)

      # Step 6: Upload Cypress test results as an artifact
      - name: Upload Cypress test results
        uses: actions/upload-artifact@v4 # Update to v4
        with:
          name: cypress-results
          path: cypress/results #  Make sure this path is correct.  Cypress 10+ defaults to a different results location.
          if-no-files-found: warn
          retention-days: 30