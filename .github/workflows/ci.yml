name: Run Cypress Tests

on:
  push:
    branches:
      - main

jobs:
  cypress:
    runs-on: ubuntu-latest
    steps:
      # ✅ Step 1: Ensure Latest Code is Pulled
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # Ensures full history is fetched

      # ✅ Step 2: Show Latest Commit
      - name: Show latest commit
        run: git log -1

      # ✅ Step 3: Remove Old Files & Cache
      - name: Remove old files & cache
        run: |
          rm -rf node_modules package-lock.json cypress/results docs/cypress-results

      # ✅ Step 4: Set Up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # ✅ Step 5: Install dependencies
      - name: Install dependencies
        run: npm install # Use npm install to generate package-lock.json if it doesn't exist
      
      # ✅ Step 5.1: Install dependencies using npm ci
      - name: Install dependencies using npm ci
        run: npm ci # Ensures a clean install with no cache
        if: steps.install_dependencies.outcome == 'success'

      # ✅ Step 6: Run Cypress Tests
      - name: Run Cypress tests
        uses: cypress-io/github-action@v5
        with:
          browser: chrome

      # ✅ Step 7: Upload Cypress Test Results
      - name: Upload Cypress test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: cypress/results

      # ✅ Step 8: Generate and Upload Mochawesome Report
