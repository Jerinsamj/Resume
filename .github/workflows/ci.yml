name: Cypress Testing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      - name: Install dependencies
        run: |
          npm install
          npm install cypress mochawesome mochawesome-merge mochawesome-report-generator --save-dev

      - name: Run Cypress tests
        run: |
          npx cypress run --reporter mochawesome --reporter-options reportDir=cypress/results,overwrite=false,html=true,json=true

      - name: Upload Cypress Mochawesome Report
        uses: actions/upload-artifact@v2
        with:
          name: cypress-results
          path: cypress/results  # Upload the results folder

      - name: Generate and Upload Mochawesome HTML Report
        if: success()  # Only upload if the tests are successful
        run: |
          mkdir -p docs/cypress-results
          cp cypress/results/*.html docs/cypress-results/
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add .
          git commit -m "Update Cypress results"
          git push
