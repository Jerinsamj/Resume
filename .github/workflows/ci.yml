name: Run Cypress Tests

on:
  push:
    branches:
      - main

jobs:
  cypress:
    runs-on: ubuntu-latest
    steps:
      # ✅ Step 1: Checkout Latest Code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ✅ Step 2: Show Latest Commit
      - name: Show latest commit
        run: git log -1

      # ✅ Step 3: Set Up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm' # Consider caching, but ensure lock file is up-to-date

      # ✅ Step 4: Install dependencies and create lockfile
      - name: Install dependencies
        run: npm install #  Use npm install to ensure package-lock.json is up-to-date

      # ✅ Step 5: Clean install with npm ci
      - name: Clean install dependencies
        run: npm ci
        if: steps.install_dependencies.outcome == 'success' # only runs if previous step was successful

      # ✅ Step 6: Upload Cypress Test Results
      - name: Upload Cypress test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: cypress/results

      # ✅ Step 7: Generate and Upload Mochawesome Report
      - name: Generate and Upload Mochawesome Report
        if: always()
        run: |
          REPORT_DIR="docs/cypress-results"
          mkdir -p $REPORT_DIR
          find cypress/results -name "*.html" -exec cp {} $REPORT_DIR \; || echo "No HTML reports found."
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add $REPORT_DIR || echo "No new results to commit."
          git commit -m "Update Cypress results" || echo "No changes to commit."
          git push || echo "No changes to push."
