name: Run Cypress Tests

on:
  push:
    branches:
      - main

jobs:
  cypress:
    runs-on: ubuntu-latest
    steps:
      # ✅ Step 1: Force Checkout the Latest Version
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Ensures full history is fetched to avoid caching issues
          ref: main  # Ensures latest version of the main branch is checked out

      # ✅ Step 2: Remove Any Cached Dependencies or Build Artifacts
      - name: Remove cached dependencies and artifacts
        run: |
          rm -rf node_modules package-lock.json cypress/results docs/cypress-results

      # ✅ Step 3: Set Up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'  # Use latest stable version or 'lts/*'

      # ✅ Step 4: Force Install Dependencies (No Cache)
            # Remove cache to force fresh install
            name: Install dependencies
            run: |
              rm -rf node_modules package-lock.json
              npm install

      # ✅ Step 5: Verify Latest Commit is Being Used
      - name: Show latest commit
        run: git log -1  # Displays the latest commit in the GitHub Actions log

      # ✅ Step 6: Run Cypress Tests
      - name: Run Cypress tests
        uses: cypress-io/github-action@v5
        with:
          browser: chrome  # Run tests in Chrome browser

      # ✅ Step 7: Upload Cypress Test Results
      - name: Upload Cypress test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
