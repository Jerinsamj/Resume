name: Run Cypress Tests

on:
  push:
    branches:
      - main

jobs:
  cypress:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v2

      # Step 2: Cache Node.js dependencies for faster builds
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      # Step 3: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      # Step 4: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 5: Run Cypress tests
      - name: Run Cypress tests
        run: npx cypress run

      # Step 6: Upload Cypress test results as an artifact
      - name: Upload Cypress test results
        uses: actions/upload-artifact@v2  # Use v2 (most stable)
        with:
          name: cypress-results  # Artifact name (optional, default is 'artifact')
          path: cypress/results  # Path to the directory with the results (adjust as necessary)
          if-no-files-found: warn  # Optional: If no files are found, output a warning (default is 'warn')
          retention-days: 30  # Optional: Retain the artifact for 30 days (default is 90 days)
          overwrite: true  # Optional: Overwrite existing artifacts with the same name (default is false)
          include-hidden-files: true  # Optional: Include hidden files (default is false)
